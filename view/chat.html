<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能办公问答</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #0f172a, #1e293b);
            --card: rgba(15, 23, 42, 0.86);
            --border: rgba(148, 163, 184, 0.25);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --primary: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
        }
        .layout {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            align-items: start;
        }
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
            backdrop-filter: blur(10px);
        }
        h3 { margin: 0 0 12px; font-size: 26px; }
        .sub { color: var(--muted); line-height: 1.7; margin-bottom: 18px; }
        .user-item { margin-bottom: 12px; line-height: 1.6; color: var(--muted); }
        .user-item strong { color: var(--text); }
        .hint {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: #bae6fd;
            line-height: 1.7;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.7);
            color: var(--text);
            padding: 14px;
            font-size: 15px;
            outline: none;
            resize: vertical;
        }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }
        button {
            margin-top: 12px;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: #082f49;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { filter: brightness(0.95); }
        .ans {
            margin-top: 18px;
            white-space: pre-wrap;
            line-height: 1.8;
            color: var(--text);
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        .status { color: var(--muted); }
        a { color: var(--primary); text-decoration: none; }
        .top-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.55);
            color: var(--text);
        }
        @media (max-width: 920px) {
            .layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="panel">
            <h3>企业私有知识库问答</h3>
            <div class="sub">系统会依据你的部门、角色和密级权限进行检索与过滤。</div>
            <div class="user-item"><strong>账号</strong><br><span id="user_display">加载中...</span></div>
            <div class="user-item"><strong>部门</strong><br><span id="dept_display">加载中...</span></div>
            <div class="user-item"><strong>角色等级</strong><br><span id="role_display">加载中...</span></div>
            <div class="user-item"><strong>可访问最高密级</strong><br><span id="max_secret_display">加载中...</span></div>
            <div class="hint" id="scope_hint">正在加载你的访问范围...</div>
            <div class="top-actions">
                <a class="action-btn" href="/view/upload.html">上传资料</a>
                <a class="action-btn" href="/admin">管理后台</a>
                <a class="action-btn" href="#" onclick="logout(); return false;">退出系统</a>
            </div>
        </div>
        <div class="panel">
            <textarea id="q" placeholder="请输入问题，例如：AISWare iLinkS有哪些款型"></textarea>
            <br>
            <button onclick="ask()">提交提问</button>
            <div id="ans" class="ans status">请先提问。</div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userDisplay = document.getElementById('user_display');
        const deptDisplay = document.getElementById('dept_display');
        const roleDisplay = document.getElementById('role_display');
        const maxSecretDisplay = document.getElementById('max_secret_display');
        const scopeHint = document.getElementById('scope_hint');
        const ans = document.getElementById('ans');
        const roleNames = ['普通员工', '业务骨干', '部门负责人', '高管/管理员'];
        const secretLabels = ['0 - 公开', '1 - 普通', '2 - 内部', '3 - 机密'];

        function logout() {
            localStorage.removeItem('token');
            location.href = '/';
        }

        async function loadUserInfo() {
            if (!token) {
                location.href = '/';
                return;
            }
            try {
                const resp = await fetch('/api/user/info', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const data = await resp.json();
                if (resp.ok && data.user_id) {
                    userDisplay.textContent = `${data.user_id}（${data.username || ''}）`;
                    deptDisplay.textContent = data.dept_name || '';
                    roleDisplay.textContent = `${data.role_level} - ${roleNames[data.role_level] || '未知'}`;
                    maxSecretDisplay.textContent = `${data.allow_max_secret} - ${secretLabels[data.allow_max_secret] || ''}`;
                    scopeHint.textContent = `你当前可检索本部门资料，系统会过滤超过 ${data.allow_max_secret} 级的文档。`;
                } else {
                    scopeHint.textContent = data.msg || '获取用户信息失败';
                }
            } catch (err) {
                scopeHint.textContent = '获取用户信息失败：' + err.message;
            }
        }

        async function ask(){
            if(!token){location.href='/';return;}
            let q = document.getElementById("q").value;
            ans.innerText = "正在思考，请稍候...";

            try {
                let res = await fetch("/rag/chat",{
                    method:"POST",
                    headers:{
                        "Authorization":"Bearer "+token,
                        "Content-Type":"application/x-www-form-urlencoded"
                    },
                    body:"query="+encodeURIComponent(q)
                });

                let text = await res.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error(text || "服务返回了非JSON内容");
                }

                ans.innerText = data.data || data.msg || "暂无返回结果";
            } catch (error) {
                ans.innerText = "请求失败：" + error.message;
            }
        }

        loadUserInfo();
    </script>
</body>
</html>
