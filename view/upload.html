<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库资料上传</title>
    <style>
        :root { --bg: linear-gradient(135deg, #0f172a, #1e293b); --card: rgba(15, 23, 42, 0.86); --border: rgba(148, 163, 184, 0.25); --text: #e2e8f0; --muted: #94a3b8; --primary: #38bdf8; --success: #22c55e; --danger: #ef4444; }
        *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:24px}
        .workspace{position:fixed;left:0;top:0;height:100vh;width:280px;background:rgba(15,23,42,.95);border-right:1px solid var(--border);padding:16px;transform:translateX(0);transition:transform .25s ease;z-index:30;overflow:auto}.workspace.collapsed{transform:translateX(-100%)}.workspace-toggle{position:fixed;left:8px;top:12px;z-index:40}
        .workspace .nav{display:flex;flex-direction:column;gap:8px}.workspace .nav a{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.15);color:var(--text);text-decoration:none} .legacy{padding:12px 14px;border-radius:12px;margin-top:12px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:#fde68a;line-height:1.7}.workspace .brand{font-size:20px;line-height:1.1;font-weight:800;margin:0 0 12px;color:var(--text);text-align:left}.workspace-toggle{font-weight:700}.workspace .nav a.active{outline:2px solid rgba(56,189,248,.45)}
        .card{width:min(1100px,100%);margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;backdrop-filter:blur(10px)} .main{margin-left:300px;transition:margin-left .25s ease}.main.expanded{margin-left:24px}
        .top-actions,.bottom-actions{display:flex;gap:10px;flex-wrap:wrap}.action-btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:rgba(15,23,42,.55);color:var(--text);text-decoration:none}
        .layout{display:grid;grid-template-columns:320px 1fr;gap:20px;margin-top:18px}.panel{border:1px solid var(--border);border-radius:16px;background:rgba(15,23,42,.45);padding:18px}
        .hint{padding:12px 14px;border-radius:12px;background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.2);color:#bae6fd;line-height:1.7;margin-top:14px}.logbox{margin-top:12px;max-height:260px;overflow:auto;white-space:pre-wrap;background:rgba(2,6,23,.6);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:13px;line-height:1.6}
        .status{margin-top:16px;padding:12px 14px;border-radius:12px;background:rgba(15,23,42,.55);border:1px solid var(--border);color:var(--muted);white-space:pre-wrap}.status.success{color:var(--success)}.status.error{color:var(--danger)}
        .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.field{display:flex;flex-direction:column;gap:8px}.field.full{grid-column:1/-1} label{font-size:14px;color:#cbd5e1}
        input,select,button,textarea{border-radius:12px;border:1px solid var(--border);background:rgba(15,23,42,.7);color:var(--text);padding:12px 14px;font-size:15px;outline:none} textarea{min-height:120px;resize:vertical}
        .acl-row{display:grid;grid-template-columns:1fr 1fr 120px auto;gap:10px;align-items:center;margin-bottom:10px}.acl-row input,.acl-row select{width:100%}.danger-btn{background:transparent;color:var(--danger);border-color:rgba(239,68,68,.4)}
        button{cursor:pointer;background:var(--primary);border-color:transparent;color:#082f49;font-weight:700}.add-btn{margin-top:10px;background:transparent;color:var(--text);border-color:var(--border)}
        @media (max-width: 920px){.layout{grid-template-columns:1fr}.acl-row{grid-template-columns:1fr 1fr}.main{margin-left:0}.workspace{width:250px}.workspace-toggle{left:auto;right:12px}}
    </style>
</head>
<body>
<button class="workspace-toggle action-btn" onclick="toggleWorkspace()">工作区</button>
<aside id="workspace" class="workspace">
    <div class="brand">工作区</div>
    <div class="nav" style="margin-top:12px;">
        <a href="/chat">1、会话窗口 /chat</a>
        <a href="/view/upload.html">2、资料上传 view/upload.html</a>
        <a href="/acl/manage">3、ACL 管理</a>
        <a href="/personal.html">4、个人信息</a>
        <a href="#" onclick="logout();return false;">退出系统</a>
    </div>
    <div class="legacy">遗留问题：Chroma 前置更强过滤、文档脱敏后再入库。</div>
</aside>
<div id="main" class="main">
<div class="card">
    <h1>知识库资料上传</h1>
    <p class="sub">上传文档并绑定权限信息，供 RAG 检索使用。</p>
    <div class="top-actions">
        <a class="action-btn" href="/chat">返回对话页</a>
        <a class="action-btn" href="/acl/manage">ACL 管理</a>
        <a class="action-btn" href="/personal.html">个人信息</a>
        <a class="action-btn" href="#" onclick="logout();return false;">退出系统</a>
    </div>
    <div class="layout">
        <div class="panel">
            <h2>当前用户信息</h2>
            <div class="legacy">提示：黑名单（deny）优先于白名单（allow）。上传后可继续在 ACL 管理页调整。</div>
            <div class="hint" id="upload_hint">系统将根据你的登录身份自动固定上传人和所属部门，密级选项也会按你的权限自动限制。</div>
            <div class="status" id="status">正在获取当前用户信息...</div>
            <div class="logbox" id="aclLogBox">ACL 命中日志会显示在这里。</div>
        </div>
        <div class="panel">
            <form id="uploadForm">
                <div class="grid">
                    <div class="field full"><label for="file">选择文件</label><input id="file" name="file" type="file" accept=".txt,.pdf,.md,.docx" required /></div>
                    <div class="field"><label>上传人账号</label><input id="uploader_display_input" type="text" readonly /></div>
                    <div class="field"><label>所属部门</label><input id="dept_display_input" type="text" readonly /></div>
                    <div class="field"><label for="secret_level">文档密级</label><select id="secret_level" name="secret_level"></select></div>
                    <div class="field"><label>操作</label><button type="submit">上传资料</button></div>
                </div>
                <h3 style="margin:18px 0 10px;">ACL 规则</h3>
                <div id="aclList"></div>
                <button type="button" class="add-btn" onclick="addAclRow()">新增 ACL 规则</button>
            </form>
            <div class="bottom-actions" style="margin-top:18px;">
                <a class="action-btn" href="#" onclick="logout();return false;">退出系统</a>
            </div>
        </div>
    </div>
</div>
</div>
<script>
const token = localStorage.getItem('token');
const roleNames = ['普通员工','业务骨干','部门负责人','高管/管理员'];
const secretLabels = ['0 - 公开','1 - 普通','2 - 内部','3 - 机密'];
const aclList = document.getElementById('aclList');
const aclLogBox = document.getElementById('aclLogBox');
const secretSelect = document.getElementById('secret_level');
const statusEl = document.getElementById('status');
function logout(){ localStorage.removeItem('token'); location.href='/'; }
function toggleWorkspace(){ const ws=document.getElementById('workspace'); const main=document.getElementById('main'); ws.classList.toggle('collapsed'); main.classList.toggle('expanded'); localStorage.setItem('workspace_collapsed', ws.classList.contains('collapsed') ? '1' : '0'); }
function setStatus(m,t=''){statusEl.className='status '+t;statusEl.textContent=m;}
function addAclRow(){ const row=document.createElement('div'); row.className='acl-row'; row.innerHTML=`<select class="acl-subject-type"><option value="user">user</option><option value="dept">dept</option><option value="role">role</option></select><input class="acl-subject-value" placeholder="如 sale_staff_02 / 销售部 / 2"><select class="acl-type"><option value="allow">allow</option><option value="deny">deny</option></select><button type="button" class="danger-btn">删除</button>`; row.querySelector('button').onclick=()=>row.remove(); aclList.appendChild(row); }
function buildSecretOptions(maxLevel){ secretSelect.innerHTML=''; for(let i=0;i<=maxLevel;i++){ const o=document.createElement('option'); o.value=String(i); o.textContent=secretLabels[i]; secretSelect.appendChild(o);} secretSelect.value=String(Math.min(1,maxLevel)); }
async function loadUserInfo(){ if(!token){setStatus('未登录，请先登录后再上传。','error');return;} const resp=await fetch('/api/user/info',{headers:{Authorization:`Bearer ${token}`}}); const data=await resp.json(); if(resp.ok&&data.user_id){document.getElementById('uploader_display_input').value=`${data.user_id}（${data.username||''}）`;document.getElementById('dept_display_input').value=data.dept_name||'';document.getElementById('upload_hint').textContent=`当前账号 ${data.user_id}，部门 ${data.dept_name||''}，最高可上传密级 ${data.allow_max_secret}。`;buildSecretOptions(data.allow_max_secret??0);setStatus('用户信息已加载，可以上传。');} }
function collectAclItems(){ return [...aclList.querySelectorAll('.acl-row')].map(row=>({subject_type:row.querySelector('.acl-subject-type').value,subject_value:row.querySelector('.acl-subject-value').value.trim(),acl_type:row.querySelector('.acl-type').value})).filter(x=>x.subject_value); }
function renderAclLogs(lines){ aclLogBox.textContent = lines.length?lines.join('\n'):'暂无 ACL 命中日志'; }
async function submitUpload(e){ e.preventDefault(); if(!token){setStatus('未登录，请先登录。','error');return;} const fileInput=document.getElementById('file'); if(!fileInput.files.length){setStatus('请先选择要上传的文件。','error');return;} const aclItems=collectAclItems(); const fd=new FormData(); fd.append('file',fileInput.files[0]); fd.append('secret_level',document.getElementById('secret_level').value); fd.append('acl_subject_types',aclItems.map(x=>x.subject_type).join(',')); fd.append('acl_subject_values',aclItems.map(x=>x.subject_value).join(',')); fd.append('acl_types',aclItems.map(x=>x.acl_type).join(',')); setStatus('正在上传并入库，请稍候...'); const resp=await fetch('/doc/ingest',{method:'POST',headers:{Authorization:`Bearer ${token}`},body:fd}); const text=await resp.text(); let data; try{data=JSON.parse(text)}catch{throw new Error(text||'服务返回了非JSON内容')} if(resp.ok&&data.code===200){ setStatus(`上传成功：${data.msg}\n文档ID：${data.doc_id}\n临时文件：${data.temp_file_path||''}`,'success'); } else { const detail=data.detail?`\n详情：${data.detail}`:''; const errorType=data.error_type?`\n错误类型：${data.error_type}`:''; setStatus(`${data.msg||'上传失败'}${errorType}${detail}`,'error'); if(/重复|已存在/.test(data.msg||'')) aclLogBox.textContent=`重复提示：${data.msg}\n${data.detail||''}`; } }

document.getElementById('uploadForm').addEventListener('submit', submitUpload);
addAclRow(); loadUserInfo();
renderAclLogs(['ACL 命中日志：', '1) deny 优先', '2) allow 次之', '3) no_acl 默认放行']);
</script>
</body>
</html>
