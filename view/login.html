<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>企业知识库-登录</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
        }
        .card {
            width: min(420px, calc(100% - 32px));
            background: rgba(15, 23, 42, 0.86);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }
        input, button {
            width: 100%;
            box-sizing: border-box;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: rgba(15, 23, 42, 0.7);
            color: #e2e8f0;
            padding: 12px 14px;
            font-size: 15px;
        }
        button {
            background: #38bdf8;
            color: #082f49;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
        }
        .msg {
            margin-top: 12px;
            color: #94a3b8;
            min-height: 22px;
        }
        .top-actions {
            margin-top: 18px;
            display: flex;
            justify-content: center;
        }
        .action-btn {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center;margin-top:0;">RBAC企业RAG智能知识库</h2>
        <div style="margin:20px 0;">
            <input type="text" id="user_id" placeholder="输入账号"><br><br>
            <input type="password" id="pwd" placeholder="输入密码"><br><br>
            <button onclick="login()">登录</button>
        </div>
        <div id="msg" class="msg"></div>
        <div class="top-actions">
            <a class="action-btn" href="#" onclick="logout(); return false;">退出系统</a>
        </div>
    </div>
    <script>
        const msgEl = document.getElementById('msg');
        function logout() {
            localStorage.removeItem('token');
            msgEl.textContent = '已退出登录';
        }
        async function login(){
            let user_id = document.getElementById("user_id").value;
            let pwd = document.getElementById("pwd").value;
            let formData = new FormData();
            formData.append("user_id", user_id);
            formData.append("password", pwd);

            let res = await fetch("/api/user/login", {
                method: "POST",
                body: formData
            });
            let data = await res.json();
            if(data.code===200){
                localStorage.setItem("token",data.token);
                location.href="/chat";
            }else{
                msgEl.textContent = data.msg || '登录失败';
            }
        }
    </script>
</body>
</html>
